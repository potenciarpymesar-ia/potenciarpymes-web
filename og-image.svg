<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <radialGradient id="g1" cx="15%" cy="25%" r="60%" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#2a7040" stop-opacity="0.38"/>
      <stop offset="100%" stop-color="#0a0a0a" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="g2" cx="85%" cy="80%" r="50%" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#1a5050" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#0a0a0a" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="g3" cx="55%" cy="0%" r="40%" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#3a8040" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#0a0a0a" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#0a0a0a"/>
  <rect width="1200" height="630" fill="url(#g1)"/>
  <rect width="1200" height="630" fill="url(#g2)"/>
  <rect width="1200" height="630" fill="url(#g3)"/>

  <!-- Bottom accent strip -->
  <rect x="0" y="622" width="1200" height="8" fill="#9de84a" opacity="0.7" rx="0"/>

  <!-- Top label -->
  <text x="80" y="108" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" fill="#9de84a" letter-spacing="4">POTENCIAR PYMES</text>

  <!-- Divider under label -->
  <rect x="80" y="120" width="48" height="2" fill="#9de84a" rx="1"/>

  <!-- Main headline line 1 -->
  <text x="80" y="230" font-family="system-ui,-apple-system,sans-serif" font-size="72" font-weight="800" fill="#f4f4f4" letter-spacing="-1.5">Tu pyme tiene producto.</text>

  <!-- Main headline line 2 — accent -->
  <text x="80" y="316" font-family="system-ui,-apple-system,sans-serif" font-size="72" font-weight="800" fill="#9de84a" letter-spacing="-1.5">Le falta el sistema.</text>

  <!-- Subheadline -->
  <text x="80" y="392" font-family="system-ui,-apple-system,sans-serif" font-size="24" fill="#8a8e87">Ecosistema digital completo para pymes argentinas — Buenos Aires</text>

  <!-- Service tags -->
  <text x="80" y="444" font-family="system-ui,-apple-system,sans-serif" font-size="17" fill="#4a4e48">Tiendanube · Mercado Libre · Meta Ads · WhatsApp Business · SEO/GEO · GA4</text>

  <!-- CTA pill -->
  <rect x="80" y="496" width="318" height="56" rx="10" fill="#9de84a"/>
  <text x="239" y="530" font-family="system-ui,-apple-system,sans-serif" font-size="19" font-weight="700" fill="#0a0a0a" text-anchor="middle">⚡ Diagnóstico gratuito →</text>

  <!-- Side stat blocks -->
  <rect x="900" y="200" width="220" height="90" rx="10" fill="#141414" stroke="#1e1e1e" stroke-width="1"/>
  <text x="1010" y="244" font-family="system-ui,-apple-system,sans-serif" font-size="40" font-weight="800" fill="#9de84a" text-anchor="middle">20+</text>
  <text x="1010" y="272" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#6a6e68" text-anchor="middle">años de experiencia</text>

  <rect x="900" y="310" width="220" height="90" rx="10" fill="#141414" stroke="#1e1e1e" stroke-width="1"/>
  <text x="1010" y="354" font-family="system-ui,-apple-system,sans-serif" font-size="40" font-weight="800" fill="#9de84a" text-anchor="middle">3</text>
  <text x="1010" y="382" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#6a6e68" text-anchor="middle">marcas D2C propias</text>

  <rect x="900" y="420" width="220" height="90" rx="10" fill="#141414" stroke="#1e1e1e" stroke-width="1"/>
  <text x="1010" y="462" font-family="system-ui,-apple-system,sans-serif" font-size="34" font-weight="800" fill="#9de84a" text-anchor="middle">15 min</text>
  <text x="1010" y="490" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#6a6e68" text-anchor="middle">diagnóstico gratuito</text>

  <!-- Domain -->
  <text x="1140" y="595" font-family="system-ui,-apple-system,sans-serif" font-size="15" fill="#3a3e38" text-anchor="end">potenciarpymes.ar</text>
