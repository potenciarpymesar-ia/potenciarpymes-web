<!doctype html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Tu reporte de auditoría | Potenciar Pymes</title>
<style>
  :root {
    --paper-0: oklch(4% 0 0);
    --paper-1: oklch(8% 0 0);
    --paper-2: oklch(12% 0.005 145);
    --accent: oklch(83% 0.22 145);
    --secondary: oklch(60% 0.20 280);
    --text-1: oklch(97% 0 0);
    --text-2: oklch(72% 0.008 145);
    --text-3: oklch(60% 0.01 145);
    --ff-display: 'Barlow Condensed', system-ui, sans-serif;
    --ff-body: 'Barlow', system-ui, sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--paper-0);
    color: var(--text-1);
    font-family: var(--ff-body);
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
  }
  header {
    padding: 1.25rem clamp(1rem, 5vw, 3rem);
    border-bottom: 1px solid oklch(100% 0 0 / .08);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .brand {
    font-family: var(--ff-display);
    font-weight: 800;
    font-size: 1.15rem;
    text-decoration: none;
    color: var(--text-1);
    letter-spacing: -.01em;
  }
  .brand span { color: var(--accent); }
  header a.back {
    color: var(--text-3);
    text-decoration: none;
    font-size: .9rem;
  }
  header a.back:hover { color: var(--text-1); }
  main {
    flex: 1;
    display: flex;
    flex-direction: column;
  }
  .state-wrap {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 1rem;
    padding: 3rem 1.5rem;
    text-align: center;
  }
  .spinner {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    border: 3px solid oklch(100% 0 0 / .1);
    border-top-color: var(--accent);
    animation: spin .8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .state-wrap p { color: var(--text-3); font-size: .95rem; }
  .state-wrap h2 {
    font-family: var(--ff-display);
    font-size: 1.5rem;
    font-weight: 700;
  }
  .state-wrap a.wa {
    margin-top: .5rem;
    display: inline-flex;
    align-items: center;
    gap: .5em;
    background: var(--accent);
    color: var(--paper-0);
    font-family: var(--ff-display);
    font-weight: 700;
    text-decoration: none;
    padding: .75rem 1.5rem;
    border-radius: 10px;
    text-transform: uppercase;
    letter-spacing: .03em;
    font-size: .9rem;
  }
  #report-frame {
    flex: 1;
    width: 100%;
    border: none;
    display: none;
  }
  @media (prefers-reduced-motion: reduce) {
    .spinner { animation: none; border-top-color: var(--text-3); }
  }
</style>
</head>
<body>

<header>
  <a class="brand" href="/">potenciar<span>·</span>pymes</a>
  <a class="back" href="https://wa.me/5491150161326?text=Hola%2C%20tengo%20una%20consulta%20sobre%20mi%20reporte">Hablar con Jonathan →</a>
</header>

<main>
  <div class="state-wrap" id="loading">
    <div class="spinner" aria-hidden="true"></div>
    <p>Cargando tu reporte…</p>
  </div>

  <div class="state-wrap" id="error" style="display:none;">
    <h2>No pudimos cargar el reporte</h2>
    <p>El link puede haber expirado o el ID no es válido. Escribinos y te lo reenviamos.</p>
    <a class="wa" href="https://wa.me/5491150161326?text=Hola%2C%20no%20me%20carga%20mi%20reporte%20de%20auditor%C3%ADa" target="_blank" rel="noopener">Escribir por WhatsApp</a>
  </div>

  <iframe id="report-frame" title="Reporte de auditoría" sandbox="allow-same-origin allow-popups"></iframe>
</main>

<script>
(function () {
  var SUPABASE_BASE = 'https://qivylgsuuonngxnrjkvf.supabase.co/storage/v1/object/public/auditorias/reportes/';
  var params = new URLSearchParams(window.location.search);
  var id = (params.get('id') || '').trim();
  var loadingEl = document.getElementById('loading');
  var errorEl = document.getElementById('error');
  var frame = document.getElementById('report-frame');

  var validId = /^[a-f0-9-]{20,40}$/i.test(id);

  if (!validId) {
    loadingEl.style.display = 'none';
    errorEl.style.display = 'flex';
    return;
  }

  fetch(SUPABASE_BASE + encodeURIComponent(id) + '.html')
    .then(function (r) {
      if (!r.ok) throw new Error('not ok');
      return r.text();
    })
    .then(function (html) {
      frame.srcdoc = html;
      frame.style.display = 'block';
      loadingEl.style.display = 'none';
    })
    .catch(function () {
      loadingEl.style.display = 'none';
      errorEl.style.display = 'flex';
    });
})();
</script>

</body>
</html>
